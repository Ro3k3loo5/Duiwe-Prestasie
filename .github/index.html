<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon Racing & Breeding Index</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <h1 class="mb-4">🕊️ Pigeon Breeding & Racing Performance</h1>
        
        <div class="card p-4 shadow-sm mb-4">
            <h2>Top Performing Cocks</h2>
            <table id="cocksTable" class="table table-striped table-bordered" style="width:100%">
                <thead>
                    <tr>
                        <th>Cock ID</th>
                        <th>Color</th>
                        <th>Total Chicks</th>
                        <th>Breeding Index</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

    <script>
        $(document).ready(function() {
            // Fetch the automatically generated JSON file
            $('#cocksTable').DataTable({
                ajax: {
                    url: 'data/cocks.json',
                    dataSrc: ''
                },
                columns: [
                    { data: 'CockID' },
                    { data: 'Color' },
                    { data: 'TotalChicks' },
                    { data: 'BreedingIndex' }
                ]
            });
        });
    </script>
</body>
</html>
