<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon Racing & Breeding Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <style>
        body { padding-top: 20px; background-color: #f8f9fa; }
        .nav-tabs { margin-bottom: 20px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: none; }
    </style>
</head>
<body>

<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>🕊️ Pigeon Racing & Breeding Management</h1>
        <span class="badge bg-success p-2">Live Sync Enabled</span>
    </div>

    <ul class="nav nav-tabs" id="pigeonTabs" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="cocks-tab" data-bs-toggle="tab" data-bs-target="#cocks" type="button">Cocks (Gale)</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="hens-tab" data-bs-toggle="tab" data-bs-target="#hens" type="button">Hens (Duivinne)</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="pairs-tab" data-bs-toggle="tab" data-bs-target="#pairs" type="button">Breeding Pairs</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="races-tab" data-bs-toggle="tab" data-bs-target="#races" type="button">Race Performance</button>
        </li>
    </ul>

    <div class="tab-content" id="pigeonTabsContent">
        <div class="tab-pane fade show active" id="cocks" role="tabpanel">
            <div class="card p-3">
                <table id="tableCocks" class="table table-striped table-bordered w-100"></table>
            </div>
        </div>
        <div class="tab-pane fade" id="hens" role="tabpanel">
            <div class="card p-3">
                <table id="tableHens" class="table table-striped table-bordered w-100"></table>
            </div>
        </div>
        <div class="tab-pane fade" id="pairs" role="tabpanel">
            <div class="card p-3">
                <table id="tablePairs" class="table table-striped table-bordered w-100"></table>
            </div>
        </div>
        <div class="tab-pane fade" id="races" role="tabpanel">
            <div class="card p-3">
                <table id="tableRaces" class="table table-striped table-bordered w-100"></table>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
    $(document).ready(function() {
        // Load Cocks
        $('#tableCocks').DataTable({
            ajax: { url: 'data/cocks.json', dataSrc: '' },
            columns: [
                { data: 'CockID', title: 'Cock ID / Ring' },
                { data: 'Color', title: 'Color', defaultContent: "" },
                { data: 'Breed', title: 'Strain / Breed', defaultContent: "" },
                { data: 'Total Chicks', title: 'Total Chicks Tracked', defaultContent: "0" }
            ],
            pageLength: 25
        });

        // Load Hens
        $('#tableHens').DataTable({
            ajax: { url: 'data/hens.json', dataSrc: '' },
            columns: [
                { data: 'HenID', title: 'Hen ID / Ring' },
                { data: 'Color', title: 'Color', defaultContent: "" },
                { data: 'Breed', title: 'Strain / Breed', defaultContent: "" },
                { data: 'Total Chicks', title: 'Total Chicks Tracked', defaultContent: "0" }
            ],
            pageLength: 25
        });

        // Load Pairs
        $('#tablePairs').DataTable({
            ajax: { url: 'data/pairs.json', dataSrc: '' },
            columns: [
                { data: 'PairID', title: 'Pair ID' },
                { data: 'CockID', title: 'Cock Partner' },
                { data: 'HenID', title: 'Hen Partner' },
                { data: 'Active', title: 'Status', defaultContent: "Yes" }
            ]
        });

        // Load Race Performance
        $('#tableRaces').DataTable({
            ajax: { url: 'data/race_performance.json', dataSrc: '' },
            columns: [
                { data: 'RaceID', title: 'Race Station' },
                { data: 'ChickID', title: 'Pigeon Ring No' },
                { data: 'Distance', title: 'Distance (km)', defaultContent: "" },
                { data: 'Velocity', title: 'Velocity (m/m)', defaultContent: "" },
                { data: 'Position', title: 'Fed Position', defaultContent: "" }
            ],
            order: [[0, 'desc']],
            pageLength: 25
        });
    </script>
</body>
</html>
