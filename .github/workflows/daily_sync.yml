name: Daily Benzing Sync & Index Calculation

on:
  schedule:
    # 14:00 UTC matches 16:00 (4:00 PM) South African Standard Time
    - cron: '0 14 * * *'
  workflow_dispatch: # Gives you a manual button to test it instantly

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Data Tools
        run: |
          pip install pandas openpyxl beautifulsoup4 requests

      - name: Run Scraper Engine
        run: python scraper.py

      - name: Save Changes to Repository
        run: |
          git config --global user.name "Pigeon Automated Bot"
          git config --global user.email "bot@github.com"
          git add data/ DUIWE\ PRESTASIE.xlsx
          git commit -m "Automated Sync: Updated race data & breeding indexes" || exit 0
          git push
