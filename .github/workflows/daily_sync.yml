name: Daily Benzing Sync

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 14 * * *'

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Data Tools
        run: |
          pip install pandas openpyxl beautifulsoup4 requests

      - name: Run Scraper Engine
        run: python scraper.py

      - name: Save Changes to Repository
        run: |
          git config --global user.name "Pigeon Automated Bot"
          git config --global user.email "bot@github.com"
          git add data/
          git commit -m "Automated Sync: Updated race data & breeding indexes" || echo "No changes to commit"
          git fetch origin main
          git rebase origin/main || { echo "Rebase failed — aborting for manual resolution"; git rebase --abort || true; exit 1; }
          git push origin HEAD:main
