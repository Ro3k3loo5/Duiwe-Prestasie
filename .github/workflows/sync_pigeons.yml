name: Daily Pigeon Results Sync

on:
  schedule:
    - cron: '0 14 * * *' # Runs daily at 14:00 UTC (16:00 SAST)
  workflow_dispatch: # Allows you to trigger it manually anytime

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-node-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl beautifulsoup4 requests

      - name: Run Scraper and Index Updater
        run: python update_records.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Pigeon Bot"
          git config --global user.email "bot@github.com"
          git add data/
          git commit -m "Automated Sync: New race results and index update" || exit 0
          git push
