<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duiwe Prestasie Dashboard</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Duiwe Prestasie">
    <link rel="apple-touch-icon" href="app-icon.png">
    <link rel="icon" type="image/png" href="app-icon.png">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .active-tab { border-bottom-width: 4px; border-color: #3b82f6; color: #1d4ed8; font-weight: 700; }
        .table-container { overflow-x: auto; max-width: 100%; margin-bottom: 2rem; background: rgba(255, 255, 255, 0.9); border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); backdrop-filter: blur(4px); }
        th { cursor: pointer; user-select: none; }
        th:hover { background-color: rgba(243, 244, 246, 0.8); }
        th.sort-asc::after { content: " 🔼"; font-size: 0.7rem; }
        th.sort-desc::after { content: " 🔽"; font-size: 0.7rem; }
        
        /* Fixed, non-scrolling, faded background watermark logo */
        .watermark-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70vmin;
            height: 70vmin;
            background-image: url('logo-bg.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.05; /* Faded out to 5% so text is perfectly readable over it */
            z-index: -10;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen relative">

    <div class="watermark-bg"></div>

    <header class="bg-gradient-to-r block bg-blue-700/90 text-white p-6 shadow-md backdrop-blur-sm">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-dove text-3xl"></i>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Duiwe-Prestasie Engine</h1>
                    <p class="text-blue-200 text-xs">Live Analytics, Breeding Logs & Race Indicators</p>
                </div>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="toggleModal('chickModal')" class="bg-green-600 hover:bg-green-700 px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-2 transition"><i class="fa-solid fa-plus"></i> + Chick</button>
                <button onclick="toggleModal('pigeonModal')" class="bg-indigo-600 hover:bg-indigo-700 px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-2 transition"><i class="fa-solid fa-dna"></i> + Cock/Hen</button>
            </div>
        </div>
    </header>

    <nav class="bg-white/90 border-b border-gray-200 sticky top-0 z-40 shadow-sm backdrop-blur-sm">
        <div class="max-w-7xl mx-auto px-4 overflow-x-auto flex space-x-1" id="navTabsContainer">
            <button onclick="switchTab('chicks')" id="tab-chicks" class="px-4 py-4 text-sm font-medium text-gray-600 hover:text-blue-600 border-b-2 border-transparent transition whitespace-nowrap active-tab">Chicks Team</button>
            <button onclick="switchTab('cocks')" id="tab-cocks" class="px-4 py-4 text-sm font-medium text-gray-600 hover:text-blue-600 border-b-2 border-transparent transition whitespace-nowrap">Cocks Stock</button>
            <button onclick="switchTab('hens')" id="tab-hens" class="px-4 py-4 text-sm font-medium text-gray-600 hover:text-blue-600 border-b-2 border-transparent transition whitespace-nowrap">Hens Stock</button>
            <button onclick="switchTab('pairs')" id="tab-pairs" class="px-4 py-4 text-sm font-medium text-gray-600 hover:text-blue-600 border-b-2 border-transparent transition whitespace-nowrap">Breeding Pairs</button>
            <button onclick="switchTab('raceperformance')" id="tab-raceperformance" class="px-4 py-4 text-sm font-medium text-gray-600 hover:text-blue-600 border-b-2 border-transparent transition whitespace-nowrap">Race Ledger</button>
            <button onclick="switchTab('byround')" id="tab-byround" class="px-4 py-4 text-sm font-medium text-gray-600 hover:text-blue-600 border-b-2 border-transparent transition whitespace-nowrap">By Round</button>
            <button onclick="switchTab('bymonth')" id="tab-bymonth" class="px-4 py-4 text-sm font-medium text-gray-600 hover:text-blue-600 border-b-2 border-transparent transition whitespace-nowrap">By Month</button>
            <button onclick="switchTab('summary')" id="tab-summary" class="px-4 py-4 text-sm font-medium text-gray-600 hover:text-blue-600 border-b-2 border-transparent transition whitespace-nowrap">Summary Hub</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        
        <div class="bg-white/80 backdrop-blur-sm p-4 rounded-lg shadow mb-6 border border-gray-200 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-2 flex-grow max-w-md">
                <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                <input type="text" id="tableGlobalSearch" oninput="applyFiltersAndRender()" placeholder="Global text search filtering..." class="w-full bg-gray-50/50 border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div id="contextualFiltersArea" class="flex flex-wrap items-center gap-
